<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFE QUIZZ made by rohit</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #58cc02;
            --indigo: #5865f2;
            --white: #ffffff;
            --incorrect: #ea2b2b;
            --gray: #afafaf;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: #f7f7f7;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app-container {
            width: 90%;
            max-width: 500px;
            background: var(--white);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 0px #e5e5e5;
            border: 2px solid #e5e5e5;
            position: relative;
        }

        .timer-circle {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--white);
            border: 4px solid var(--indigo);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            color: var(--indigo);
            font-size: 1.3rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header { display: flex; align-items: center; gap: 15px; margin-top: 15px; margin-bottom: 20px; }
        .progress-bg { flex-grow: 1; height: 14px; background: #e5e5e5; border-radius: 10px; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: var(--primary); transition: 0.4s; }
        
        .ch-info { color: var(--indigo); font-weight: 800; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; }
        
        .word-section { text-align: center; margin-bottom: 25px; }
        .word-section h1 { font-size: 2.6rem; margin: 5px 0; color: #3c3c3c; }

        .speaker-btn { background: #f0f0f0; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 1.2rem; }

        .options-grid { display: grid; gap: 12px; }
        .opt-btn { 
            background: white; border: 2px solid #e5e5e5; padding: 18px; 
            border-radius: 15px; font-weight: 700; cursor: pointer; text-align: left;
            box-shadow: 0 4px 0px #e5e5e5; font-size: 1.1rem; transition: 0.1s;
        }
        .opt-btn.correct { background: #d7ffb8; border-color: var(--primary); color: #46a302; box-shadow: 0 4px 0px var(--primary); }
        .opt-btn.wrong { background: #ffdfe0; border-color: var(--incorrect); color: var(--incorrect); box-shadow: 0 4px 0px var(--incorrect); }

        .nav-btn { width: 100%; background: var(--indigo); color: white; border: none; padding: 18px; border-radius: 15px; font-size: 1.2rem; font-weight: 900; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 0px #3e48ae; }

        /* Leaderboard Styling */
        .leaderboard-list { margin-top: 20px; text-align: left; background: #f9f9f9; padding: 10px; border-radius: 10px; }
        .lb-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #ddd; font-weight: 700; }

        input[type="text"] { width: 90%; padding: 12px; border-radius: 10px; border: 2px solid #ddd; margin-bottom: 10px; font-family: inherit; font-weight: 700; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="setup">
        <h1 style="color: var(--indigo); font-weight: 900; text-align: center;">MFE QUIZZ<br><small style="color: #666; font-size: 1rem;">made by rohit</small></h1>
        <div style="text-align: center; margin: 20px 0;">
            <input type="text" id="student-name" placeholder="Apna Naam Likhein...">
            <select id="chapter-range">
                <option value="All">All 65 Chapters (Full Mix)</option>
                <option value="Jhaji">Jhaji Achaar Special</option>
                <option value="PW">Physics Wallah Special</option>
                <option value="Manjhi">The Mountain Man Special</option>
            </select>
            <button onclick="startApp()" class="nav-btn">START GAME</button>
        </div>
        <div id="lb-container">
            <h3 style="margin-bottom: 5px;">🏆 Leaderboard (Top 5)</h3>
            <div class="leaderboard-list" id="lb-list">Loading scores...</div>
        </div>
    </div>

    <div id="quiz" style="display: none;">
        <div class="timer-circle" id="timer">15</div>
        <div class="header">
            <div class="progress-bg"><div id="progress-fill"></div></div>
            <div style="font-weight: 900; color: var(--indigo);">⭐ <span id="score">0</span></div>
        </div>
        <div class="word-section">
            <div class="ch-info" id="chapter-tag">Chapter Info</div>
            <h1 id="target-word">Word</h1>
            <button class="speaker-btn" onclick="speak()">🔊</button>
        </div>
        <div id="options" class="options-grid"></div>
        <button id="next" class="nav-btn" style="display: none;" onclick="nextQuestion()">AGLA SHABD</button>
    </div>
</div>

<script>
    const database = [
        { w: "Fluency", m: "Rukaavat ke bina bolna", c: "Ch 1: Introduction" },
        { w: "Discovery", m: "Nayi cheez ki khoj", c: "Ch 1: Reading" },
        { w: "Pronunciation", m: "Uchcharan ka tarika", c: "Ch 2: English Skills" },
        { w: "Sufficiently", m: "Kaafi matra mein", c: "Ch 1: Instructions" },
        { w: "Entrepreneur", m: "Naya business shuru karne wala", c: "Ch 12: Jhaji Achaar" },
        { w: "Authenticity", m: "Asliyat ya sachai", c: "Ch 12: Jhaji Achaar" },
        { w: "Traditional", m: "Paramparagat ya purana", c: "Ch 12: Jhaji Achaar" },
        { w: "Delicious", m: "Bahut swadisht", c: "Ch 12: Jhaji Achaar" },
        { w: "Affordable", m: "Sasta ya kifayati", c: "Ch 22: Physics Wallah" },
        { w: "Revolution", m: "Badi kranti", c: "Ch 23: Education" },
        { w: "Aspirant", m: "Ummidwar ya taiyari karne wala", c: "Ch 22: Physics Wallah" },
        { w: "Mentor", m: "Guru ya Salahkar", c: "Ch 24: Alakh Pandey" },
        { w: "Perseverance", m: "Kathin parishram aur dridhata", c: "Ch 42: Dashrath Manjhi" },
        { w: "Obstacle", m: "Rukaavat ya baadha", c: "Ch 43: Mountain Challenge" },
        { w: "Chisel", m: "Chheni (Patthar katne ka auzar)", c: "Ch 42: Mountain Man" },
        { w: "Isolated", m: "Sabse alag-thalag", c: "Ch 44: Village" },
        { w: "Resilience", m: "Mushkilon se ladne ki shakti", c: "Ch 45: Success" },
        { w: "Mindfulness", m: "Puri tarah jagruk hona", c: "Ch 52: Glow Up" },
        { w: "Consistency", m: "Nirantarta ya rozana", c: "Ch 58: Habits" },
        { w: "Gratitude", m: "Shukraguzari", c: "Ch 55: Daily Life" },
        { w: "Automatic", m: "Apne aap hone wala", c: "Ch 60: Brushing" },
        { w: "Perspective", m: "Dekhne ka nazariya", c: "Ch 65: Final Speech" }
    ];

    let currentSet = [];
    let qIdx = 0;
    let score = 0;
    let timer;
    let timeLeft = 15;
    let playerName = "";

    // Leaderboard System using LocalStorage
    function updateLeaderboard() {
        let scores = JSON.parse(localStorage.getItem('mfeScores')) || [];
        scores.sort((a,b) => b.score - a.score);
        let listHtml = scores.slice(0, 5).map(s => `<div class="lb-item"><span>${s.name}</span><span>${s.score} pts</span></div>`).join('');
        document.getElementById('lb-list').innerHTML = listHtml || "No scores yet!";
    }

    function saveScore() {
        let scores = JSON.parse(localStorage.getItem('mfeScores')) || [];
        scores.push({name: playerName, score: score});
        localStorage.setItem('mfeScores', JSON.stringify(scores));
    }

    function startApp() {
        playerName = document.getElementById('student-name').value || "Guest Student";
        document.getElementById('setup').style.display = 'none';
        document.getElementById('quiz').style.display = 'block';
        currentSet = [...database].sort(() => Math.random() - 0.5);
        showQuestion();
    }

    function showQuestion() {
        if(qIdx >= currentSet.length) {
            saveScore();
            alert(`Khatam! ${playerName}, aapka score hai: ${score}`);
            location.reload();
            return;
        }

        let q = currentSet[qIdx];
        timeLeft = 15;
        document.getElementById('timer').innerText = timeLeft;
        document.getElementById('target-word').innerText = q.w;
        document.getElementById('chapter-tag').innerText = q.c;
        document.getElementById('next').style.display = 'none';
        document.getElementById('progress-fill').style.width = (qIdx/currentSet.length*100) + "%";

        // Generate Options
        let choices = [q.m];
        while(choices.length < 4) {
            let r = database[Math.floor(Math.random()*database.length)].m;
            if(!choices.includes(r)) choices.push(r);
        }
        choices.sort(() => Math.random() - 0.5);

        let optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        choices.forEach(c => {
            let b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = c;
            b.onclick = () => checkAns(b, c, q.m);
            optDiv.appendChild(b);
        });

        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) { clearInterval(timer); checkAns(null, '', q.m); }
        }, 1000);
    }

    function checkAns(btn, sel, cor) {
        clearInterval(timer);
        let btns = document.querySelectorAll('.opt-btn');
        btns.forEach(b => b.disabled = true);

        if(sel === cor) {
            btn.classList.add('correct');
            score += 10 + timeLeft;
            document.getElementById('score').innerText = score;
        } else {
            if(btn) btn.classList.add('wrong');
            btns.forEach(b => { if(b.innerText === cor) b.classList.add('correct'); });
        }
        document.getElementById('next').style.display = 'block';
    }

    function nextQuestion() { qIdx++; showQuestion(); }
    function speak() { 
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(document.getElementById('target-word').innerText)); 
    }

    // Initial load
    updateLeaderboard();
</script>
</body>
</html>
